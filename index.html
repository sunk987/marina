<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Марина, прости</title>
    <style>
        body {
            background: pink;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            font-family: sans-serif;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 30px;
        }
        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Мариночка, прости меня ❤️</h1>
    <p>Ты — моё солнышко. Я очень сожалею и люблю тебя!</p>
    <button onclick="this.style.display='none'; this.nextSibling.style.display='block'">Прости меня, Марина</button>
    <p style="display:none; color:#c9184a;">❤️ Спасибо, любимая! ❤️</p>
</div>
</body>
</html>
